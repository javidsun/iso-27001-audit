services:
  iso-audit-db:
    container_name: iso-audit-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: iso_user
      POSTGRES_DB: iso_audit
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - iso_audit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iso_user -d iso_audit -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [iso-audit-net]

  keycloak-db:
    container_name: iso-audit-keycloak-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: admin_audit
      POSTGRES_PASSWORD: admin123
    volumes:
      - keycloak_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_audit -d keycloak -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [iso-audit-net]

  keycloak:
    container_name: iso-audit-keycloak
    image: quay.io/keycloak/keycloak:26.5.2
    restart: unless-stopped
    depends_on:
      keycloak-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:9000:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin_audit
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin123

      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: admin_audit
      KC_DB_PASSWORD: admin123

      KC_HEALTH_ENABLED: "true"
      KC_LOG: "console"
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./keycloak/realm/realm_dev.json:/opt/keycloak/data/import/realm_dev.json:ro

    # ✅ healthcheck بدون curl
    healthcheck:
      test: ["CMD-SHELL", "bash -lc ': </dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

    networks: [iso-audit-net]

  iso-audit-backend:
    container_name: iso-audit-backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      iso-audit-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8003:8003"
    environment:
      APP_ENV: dev
      DB_HOST: iso-audit-db
      DB_PORT: 5432
      DB_NAME: iso_audit
      DB_USER: iso_user
      DB_PASSWORD: ""

      KEYCLOAK_ISSUER: "http://keycloak:8080/realms/iso-audit"
      KEYCLOAK_JWKS_URL: "http://keycloak:8080/realms/iso-audit/protocol/openid-connect/certs"
      JWT_VERIFY_AUD: "false"
      JWT_EXPECTED_AUDIENCE: "iso-audit-api"

      KEYCLOAK_CLIENT_ID: "iso-audit-api"
      TENANT_GROUPS_CLAIM: "groups"
      TENANT_GROUP_PREFIX: "/org-"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8003/api/v1/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - iso-audit-net

  toolbox:
    container_name: iso-audit-toolbox
    image: curlimages/curl:8.10.1
    restart: unless-stopped
    command: ["sleep", "infinity"]
    networks: [iso-audit-net]

  tests:
    build:
      context: .
      dockerfile: Dockerfile_tests
    container_name: iso-audit-tests
    depends_on:
      iso-audit-backend:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      BACKEND_BASE: "http://iso-audit-backend:8003"
      KEYCLOAK_BASE: "http://keycloak:8080"
      KEYCLOAK_REALM: "iso-audit"
      KEYCLOAK_CLIENT_ID: "iso-audit-api"
      KEYCLOAK_USERNAME: "javid"
      KEYCLOAK_PASSWORD: "Admin@@00000"

      KEYCLOAK_ADMIN_USER: "admin_audit"
      KEYCLOAK_ADMIN_PASS: "admin123"

      TENANT_CLAIM_NAME: "org_id"
      KEYCLOAK_CLIENT_ID_FOR_ROLES: "iso-audit-api"
    networks: [iso-audit-net]

volumes:
  iso_audit_pgdata:
  keycloak_pgdata:

networks:
  iso-audit-net:
    driver: bridge